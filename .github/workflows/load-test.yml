name: Load Testing

on:
  # Manual trigger dengan pilihan tool
  workflow_dispatch:
    inputs:
      tool:
        description: 'Load test tool'
        required: true
        default: 'k6'
        type: choice
        options:
          - k6
          - artillery
          - locust
          - all
      test_type:
        description: 'Test type'
        required: true
        default: 'basic'
        type: choice
        options:
          - basic
          - advanced
      duration:
        description: 'Test duration (e.g., 30s, 1m, 5m)'
        required: false
        default: '1m'
      vus:
        description: 'Virtual users (k6/locust)'
        required: false
        default: '10'

  # Scheduled run (setiap hari jam 2 pagi UTC)
  schedule:
    - cron: '0 2 * * *'

  # Trigger on PR ke main (optional - comment jika tidak perlu)
  # pull_request:
  #   branches: [main]
  #   paths:
  #     - 'k6/**'
  #     - 'artillery/**'
  #     - 'locust/**'

env:
  TARGET_URL: https://jsonplaceholder.typicode.com

jobs:
  # ============================================
  # K6 Load Test
  # ============================================
  k6-test:
    name: K6 Load Test
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.tool == 'k6' || github.event.inputs.tool == 'all' || github.event_name == 'schedule' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run k6 basic test
        if: ${{ github.event.inputs.test_type == 'basic' || github.event.inputs.test_type == '' }}
        run: |
          k6 run k6/script.js \
            --out json=k6-results.json \
            --summary-export=k6-summary.json \
            --vus ${{ github.event.inputs.vus || '10' }} \
            --duration ${{ github.event.inputs.duration || '1m' }}
        continue-on-error: true

      - name: Run k6 advanced test
        if: ${{ github.event.inputs.test_type == 'advanced' }}
        run: |
          k6 run k6/advanced-script.js \
            --out json=k6-results.json \
            --summary-export=k6-summary.json
        continue-on-error: true

      - name: Upload k6 results
        uses: actions/upload-artifact@v4
        with:
          name: k6-results-${{ github.run_number }}
          path: |
            k6-results.json
            k6-summary.json
            summary.html
          retention-days: 30

      - name: Post k6 summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('k6-summary.json')) {
              const summary = JSON.parse(fs.readFileSync('k6-summary.json', 'utf8'));
              const metrics = summary.metrics || {};
              const httpReqDuration = metrics.http_req_duration || {};
              
              const body = `## 🚀 K6 Load Test Results
              
              | Metric | Value |
              |--------|-------|
              | Total Requests | ${metrics.http_reqs?.count || 'N/A'} |
              | Failed Requests | ${metrics.http_req_failed?.passes || 0} |
              | Avg Response Time | ${httpReqDuration.avg?.toFixed(2) || 'N/A'} ms |
              | P95 Response Time | ${httpReqDuration['p(95)']?.toFixed(2) || 'N/A'} ms |
              | P99 Response Time | ${httpReqDuration['p(99)']?.toFixed(2) || 'N/A'} ms |
              `;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

  # ============================================
  # Artillery Load Test
  # ============================================
  artillery-test:
    name: Artillery Load Test
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.tool == 'artillery' || github.event.inputs.tool == 'all' || github.event_name == 'schedule' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Artillery
        run: npm install -g artillery@latest

      - name: Run Artillery basic test
        if: ${{ github.event.inputs.test_type == 'basic' || github.event.inputs.test_type == '' }}
        run: |
          artillery run artillery/config.yml \
            --output artillery-report.json
        continue-on-error: true

      - name: Run Artillery advanced test
        if: ${{ github.event.inputs.test_type == 'advanced' }}
        run: |
          artillery run artillery/advanced-config.yml \
            --output artillery-report.json
        continue-on-error: true

      - name: Generate HTML report
        run: |
          artillery report artillery-report.json --output artillery-report.html
        continue-on-error: true

      - name: Upload Artillery results
        uses: actions/upload-artifact@v4
        with:
          name: artillery-results-${{ github.run_number }}
          path: |
            artillery-report.json
            artillery-report.html
          retention-days: 30

  # ============================================
  # Locust Load Test
  # ============================================
  locust-test:
    name: Locust Load Test
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.tool == 'locust' || github.event.inputs.tool == 'all' || github.event_name == 'schedule' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Locust
        run: pip install locust

      - name: Run Locust basic test
        if: ${{ github.event.inputs.test_type == 'basic' || github.event.inputs.test_type == '' }}
        run: |
          locust -f locust/locustfile.py \
            --host=${{ env.TARGET_URL }} \
            --headless \
            --users ${{ github.event.inputs.vus || '10' }} \
            --spawn-rate 2 \
            --run-time ${{ github.event.inputs.duration || '1m' }} \
            --html=locust-report.html \
            --csv=locust-results
        continue-on-error: true

      - name: Run Locust advanced test
        if: ${{ github.event.inputs.test_type == 'advanced' }}
        run: |
          locust -f locust/advanced_locustfile.py \
            --host=${{ env.TARGET_URL }} \
            --headless \
            --users ${{ github.event.inputs.vus || '10' }} \
            --spawn-rate 2 \
            --run-time ${{ github.event.inputs.duration || '1m' }} \
            --html=locust-report.html \
            --csv=locust-results
        continue-on-error: true

      - name: Upload Locust results
        uses: actions/upload-artifact@v4
        with:
          name: locust-results-${{ github.run_number }}
          path: |
            locust-report.html
            locust-results_stats.csv
            locust-results_stats_history.csv
            locust-results_failures.csv
          retention-days: 30

  # ============================================
  # Summary Job
  # ============================================
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [k6-test, artillery-test, locust-test]
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: results
        continue-on-error: true

      - name: Generate summary
        run: |
          echo "## 📊 Load Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| K6 | ${{ needs.k6-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Artillery | ${{ needs.artillery-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Locust | ${{ needs.locust-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u)" >> $GITHUB_STEP_SUMMARY
