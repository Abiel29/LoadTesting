# ============================================
# GitHub Actions - Load Testing Pipeline
# ============================================
# 
# Triggers:
# - Push ke main: Smoke test
# - Pull Request: Smoke test
# - Manual dispatch: Pilih test type
# - Schedule: Full test setiap malam
#
# Flow:
# 1. Build & deploy ke staging (simulasi)
# 2. Run load test sesuai trigger
# 3. Upload results & fail jika threshold tidak terpenuhi

name: Load Testing

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'api/**'
  
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'api/**'
  
  # Manual trigger dengan pilihan test type dan tool
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of load test'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - load
          - stress
          - full
      tool:
        description: 'Load testing tool'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - k6
          - artillery
          - locust
      target_url:
        description: 'Target URL (optional)'
        required: false
        default: 'https://jsonplaceholder.typicode.com'
  
  # Scheduled - setiap hari jam 2 pagi UTC
  schedule:
    - cron: '0 2 * * *'

env:
  TARGET_URL: ${{ github.event.inputs.target_url || 'https://jsonplaceholder.typicode.com' }}
  K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}

jobs:
  # ==========================================
  # Job 1: Determine test type
  # ==========================================
  setup:
    runs-on: ubuntu-latest
    outputs:
      test_type: ${{ steps.set-test-type.outputs.test_type }}
      tool: ${{ steps.set-tool.outputs.tool }}
    steps:
      - name: Determine test type
        id: set-test-type
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "test_type=${{ github.event.inputs.test_type }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "schedule" ]; then
            echo "test_type=full" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "test_type=load" >> $GITHUB_OUTPUT
          else
            echo "test_type=smoke" >> $GITHUB_OUTPUT
          fi

      - name: Determine tool
        id: set-tool
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tool=${{ github.event.inputs.tool }}" >> $GITHUB_OUTPUT
          else
            echo "tool=all" >> $GITHUB_OUTPUT
          fi

  # ==========================================
  # Job 2: k6 Load Test
  # ==========================================
  k6-test:
    needs: setup
    if: needs.setup.outputs.tool == 'all' || needs.setup.outputs.tool == 'k6'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Create results directory
        run: mkdir -p results

      - name: Run Smoke Test
        if: needs.setup.outputs.test_type == 'smoke'
        run: |
          k6 run k6/script.js \
            --env SCENARIO=smoke \
            --out json=k6-results.json \
            --summary-export=k6-summary.json
        continue-on-error: false

      - name: Run Load Test
        if: needs.setup.outputs.test_type == 'load'
        run: |
          k6 run k6/advanced-script.js \
            --env SCENARIO=load \
            --out json=k6-results.json \
            --summary-export=k6-summary.json

      - name: Run Stress Test
        if: needs.setup.outputs.test_type == 'stress'
        run: |
          k6 run k6/advanced-script.js \
            --env SCENARIO=stress \
            --out json=k6-results.json \
            --summary-export=k6-summary.json

      - name: Run Full Test
        if: needs.setup.outputs.test_type == 'full'
        run: |
          k6 run k6/advanced-script.js \
            --out json=k6-results.json \
            --summary-export=k6-summary.json

      - name: Upload k6 Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results
          path: |
            k6-results.json
            k6-summary.json
            results/
          retention-days: 30

      - name: Check Thresholds
        run: |
          if [ -f k6-summary.json ]; then
            # Parse dan check thresholds
            FAILED=$(cat k6-summary.json | jq '.root_group.checks // 0')
            echo "Test results: $FAILED"
          fi


  # ==========================================
  # Job 3: Artillery Load Test
  # ==========================================
  artillery-test:
    needs: setup
    if: needs.setup.outputs.tool == 'all' || needs.setup.outputs.tool == 'artillery'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Artillery
        run: npm install -g artillery@latest

      - name: Run Smoke Test
        if: needs.setup.outputs.test_type == 'smoke'
        run: |
          artillery run artillery/config.yml \
            --output artillery-report.json \
            --config artillery/smoke-override.yml
          artillery report artillery-report.json --output artillery-report.html
        continue-on-error: true

      - name: Run Load/Stress/Full Test
        if: needs.setup.outputs.test_type != 'smoke'
        run: |
          artillery run artillery/advanced-config.yml \
            --output artillery-report.json
          artillery report artillery-report.json --output artillery-report.html
        continue-on-error: true

      - name: Upload Artillery Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: artillery-results
          path: |
            artillery-report.json
            artillery-report.html
          retention-days: 30

  # ==========================================
  # Job 4: Locust Load Test
  # ==========================================
  locust-test:
    needs: setup
    if: needs.setup.outputs.tool == 'all' || needs.setup.outputs.tool == 'locust'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Locust
        run: pip install locust

      - name: Run Locust Test
        run: |
          locust -f locust/advanced_locustfile.py \
            --host=https://jsonplaceholder.typicode.com \
            --headless \
            --users 50 \
            --spawn-rate 5 \
            --run-time 3m \
            --html locust-report.html \
            --csv locust-results

      - name: Upload Locust Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: locust-results
          path: |
            locust-report.html
            locust-results*.csv
          retention-days: 30

  # ==========================================
  # Job 5: Summary & Notification
  # ==========================================
  summary:
    needs: [setup, k6-test, artillery-test, locust-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: results

      - name: Generate Summary
        run: |
          echo "## 📊 Load Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Configuration" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Test Type | \`${{ needs.setup.outputs.test_type }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | \`${{ needs.setup.outputs.tool }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Target URL | \`${{ env.TARGET_URL }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Test Status" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          
          # k6 status with emoji
          if [ "${{ needs.setup.outputs.tool }}" == "all" ] || [ "${{ needs.setup.outputs.tool }}" == "k6" ]; then
            if [ "${{ needs.k6-test.result }}" == "success" ]; then
              echo "| k6 | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ needs.k6-test.result }}" == "failure" ]; then
              echo "| k6 | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| k6 | ⚠️ ${{ needs.k6-test.result }} |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "| k6 | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Artillery status with emoji
          if [ "${{ needs.setup.outputs.tool }}" == "all" ] || [ "${{ needs.setup.outputs.tool }}" == "artillery" ]; then
            if [ "${{ needs.artillery-test.result }}" == "success" ]; then
              echo "| Artillery | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ needs.artillery-test.result }}" == "failure" ]; then
              echo "| Artillery | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Artillery | ⚠️ ${{ needs.artillery-test.result }} |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "| Artillery | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Locust status with emoji
          if [ "${{ needs.setup.outputs.tool }}" == "all" ] || [ "${{ needs.setup.outputs.tool }}" == "locust" ]; then
            if [ "${{ needs.locust-test.result }}" == "success" ]; then
              echo "| Locust | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ needs.locust-test.result }}" == "failure" ]; then
              echo "| Locust | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Locust | ⚠️ ${{ needs.locust-test.result }} |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "| Locust | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # k6 Results Detail
          echo "### 🔷 k6 Results" >> $GITHUB_STEP_SUMMARY
          if [ -f results/k6-results/k6-summary.json ]; then
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            
            # Parse k6 summary JSON
            TOTAL_REQUESTS=$(cat results/k6-results/k6-summary.json | jq -r '.metrics.http_reqs.values.count // "N/A"')
            AVG_DURATION=$(cat results/k6-results/k6-summary.json | jq -r '.metrics.http_req_duration.values.avg // "N/A"' | xargs printf "%.2f")
            P95_DURATION=$(cat results/k6-results/k6-summary.json | jq -r '.metrics.http_req_duration.values["p(95)"] // "N/A"' | xargs printf "%.2f")
            P99_DURATION=$(cat results/k6-results/k6-summary.json | jq -r '.metrics.http_req_duration.values["p(99)"] // "N/A"' | xargs printf "%.2f")
            FAILED_REQUESTS=$(cat results/k6-results/k6-summary.json | jq -r '.metrics.http_req_failed.values.passes // 0')
            VUS_MAX=$(cat results/k6-results/k6-summary.json | jq -r '.metrics.vus_max.values.max // "N/A"')
            DATA_RECEIVED=$(cat results/k6-results/k6-summary.json | jq -r '.metrics.data_received.values.count // 0')
            DATA_SENT=$(cat results/k6-results/k6-summary.json | jq -r '.metrics.data_sent.values.count // 0')
            
            # Convert bytes to KB/MB
            DATA_RECEIVED_KB=$(echo "scale=2; $DATA_RECEIVED / 1024" | bc 2>/dev/null || echo "N/A")
            DATA_SENT_KB=$(echo "scale=2; $DATA_SENT / 1024" | bc 2>/dev/null || echo "N/A")
            
            echo "| Total Requests | $TOTAL_REQUESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Max Virtual Users | $VUS_MAX |" >> $GITHUB_STEP_SUMMARY
            echo "| Avg Response Time | ${AVG_DURATION}ms |" >> $GITHUB_STEP_SUMMARY
            echo "| P95 Response Time | ${P95_DURATION}ms |" >> $GITHUB_STEP_SUMMARY
            echo "| P99 Response Time | ${P99_DURATION}ms |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed Requests | $FAILED_REQUESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Data Received | ${DATA_RECEIVED_KB} KB |" >> $GITHUB_STEP_SUMMARY
            echo "| Data Sent | ${DATA_SENT_KB} KB |" >> $GITHUB_STEP_SUMMARY
          else
            echo "> ⚠️ k6 summary file not found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Artillery Results Detail
          echo "### 🔶 Artillery Results" >> $GITHUB_STEP_SUMMARY
          if [ -f results/artillery-results/artillery-report.json ]; then
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            
            # Parse Artillery JSON
            SCENARIOS_CREATED=$(cat results/artillery-results/artillery-report.json | jq -r '.aggregate.counters["vusers.created"] // 0')
            SCENARIOS_COMPLETED=$(cat results/artillery-results/artillery-report.json | jq -r '.aggregate.counters["vusers.completed"] // 0')
            SCENARIOS_FAILED=$(cat results/artillery-results/artillery-report.json | jq -r '.aggregate.counters["vusers.failed"] // 0')
            HTTP_REQUESTS=$(cat results/artillery-results/artillery-report.json | jq -r '.aggregate.counters["http.requests"] // 0')
            HTTP_200=$(cat results/artillery-results/artillery-report.json | jq -r '.aggregate.counters["http.codes.200"] // 0')
            HTTP_ERRORS=$(cat results/artillery-results/artillery-report.json | jq -r '.aggregate.counters["http.codes.5xx"] // 0')
            RESPONSE_MIN=$(cat results/artillery-results/artillery-report.json | jq -r '.aggregate.summaries["http.response_time"].min // "N/A"')
            RESPONSE_MAX=$(cat results/artillery-results/artillery-report.json | jq -r '.aggregate.summaries["http.response_time"].max // "N/A"')
            RESPONSE_MEDIAN=$(cat results/artillery-results/artillery-report.json | jq -r '.aggregate.summaries["http.response_time"].median // "N/A"')
            RESPONSE_P95=$(cat results/artillery-results/artillery-report.json | jq -r '.aggregate.summaries["http.response_time"].p95 // "N/A"')
            RESPONSE_P99=$(cat results/artillery-results/artillery-report.json | jq -r '.aggregate.summaries["http.response_time"].p99 // "N/A"')
            
            echo "| Scenarios Created | $SCENARIOS_CREATED |" >> $GITHUB_STEP_SUMMARY
            echo "| Scenarios Completed | $SCENARIOS_COMPLETED |" >> $GITHUB_STEP_SUMMARY
            echo "| Scenarios Failed | $SCENARIOS_FAILED |" >> $GITHUB_STEP_SUMMARY
            echo "| HTTP Requests | $HTTP_REQUESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| HTTP 200 OK | $HTTP_200 |" >> $GITHUB_STEP_SUMMARY
            echo "| HTTP 5xx Errors | $HTTP_ERRORS |" >> $GITHUB_STEP_SUMMARY
            echo "| Min Response Time | ${RESPONSE_MIN}ms |" >> $GITHUB_STEP_SUMMARY
            echo "| Median Response Time | ${RESPONSE_MEDIAN}ms |" >> $GITHUB_STEP_SUMMARY
            echo "| P95 Response Time | ${RESPONSE_P95}ms |" >> $GITHUB_STEP_SUMMARY
            echo "| P99 Response Time | ${RESPONSE_P99}ms |" >> $GITHUB_STEP_SUMMARY
            echo "| Max Response Time | ${RESPONSE_MAX}ms |" >> $GITHUB_STEP_SUMMARY
          else
            echo "> ⚠️ Artillery report file not found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Artifacts info
          echo "### 📁 Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "Download detailed reports from the workflow artifacts:" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.setup.outputs.tool }}" == "all" ] || [ "${{ needs.setup.outputs.tool }}" == "k6" ]; then
            echo "- \`k6-results\` - k6 JSON results and summary" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.setup.outputs.tool }}" == "all" ] || [ "${{ needs.setup.outputs.tool }}" == "artillery" ]; then
            echo "- \`artillery-results\` - Artillery JSON and HTML reports" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.setup.outputs.tool }}" == "all" ] || [ "${{ needs.setup.outputs.tool }}" == "locust" ]; then
            echo "- \`locust-results\` - Locust HTML report and CSV data" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Notify on Failure
        if: failure()
        run: |
          echo "::error::Load test failed! Check artifacts for details."
          # Tambahkan Slack/Discord notification di sini jika perlu
