# ============================================
# GitHub Actions - Load Testing Pipeline
# ============================================
# 
# Triggers:
# - Push ke main: Smoke test
# - Pull Request: Smoke test
# - Manual dispatch: Pilih test type
# - Schedule: Full test setiap malam
#
# Flow:
# 1. Build & deploy ke staging (simulasi)
# 2. Run load test sesuai trigger
# 3. Upload results & fail jika threshold tidak terpenuhi

name: Load Testing

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'api/**'
  
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'api/**'
  
  # Manual trigger dengan pilihan test type
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of load test'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - load
          - stress
          - full
      target_url:
        description: 'Target URL (optional)'
        required: false
        default: 'https://jsonplaceholder.typicode.com'
  
  # Scheduled - setiap hari jam 2 pagi UTC
  schedule:
    - cron: '0 2 * * *'

env:
  TARGET_URL: ${{ github.event.inputs.target_url || 'https://jsonplaceholder.typicode.com' }}
  K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}

jobs:
  # ==========================================
  # Job 1: Determine test type
  # ==========================================
  setup:
    runs-on: ubuntu-latest
    outputs:
      test_type: ${{ steps.set-test-type.outputs.test_type }}
    steps:
      - name: Determine test type
        id: set-test-type
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "test_type=${{ github.event.inputs.test_type }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "schedule" ]; then
            echo "test_type=full" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "test_type=load" >> $GITHUB_OUTPUT
          else
            echo "test_type=smoke" >> $GITHUB_OUTPUT
          fi

  # ==========================================
  # Job 2: k6 Load Test
  # ==========================================
  k6-test:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run Smoke Test
        if: needs.setup.outputs.test_type == 'smoke'
        run: |
          k6 run load-testing/k6/script.js \
            --env SCENARIO=smoke \
            --out json=k6-results.json \
            --summary-export=k6-summary.json
        continue-on-error: false

      - name: Run Load Test
        if: needs.setup.outputs.test_type == 'load'
        run: |
          k6 run load-testing/k6/advanced-script.js \
            --env SCENARIO=load \
            --out json=k6-results.json \
            --summary-export=k6-summary.json

      - name: Run Stress Test
        if: needs.setup.outputs.test_type == 'stress'
        run: |
          k6 run load-testing/k6/advanced-script.js \
            --env SCENARIO=stress \
            --out json=k6-results.json \
            --summary-export=k6-summary.json

      - name: Run Full Test
        if: needs.setup.outputs.test_type == 'full'
        run: |
          k6 run load-testing/k6/advanced-script.js \
            --out json=k6-results.json \
            --summary-export=k6-summary.json

      - name: Upload k6 Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results
          path: |
            k6-results.json
            k6-summary.json
            results/
          retention-days: 30

      - name: Check Thresholds
        run: |
          if [ -f k6-summary.json ]; then
            # Parse dan check thresholds
            FAILED=$(cat k6-summary.json | jq '.root_group.checks // 0')
            echo "Test results: $FAILED"
          fi


  # ==========================================
  # Job 3: Artillery Load Test
  # ==========================================
  artillery-test:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Artillery
        run: npm install -g artillery@latest

      - name: Run Smoke Test
        if: needs.setup.outputs.test_type == 'smoke'
        run: |
          artillery run load-testing/artillery/config.yml \
            --output artillery-report.json \
            --config load-testing/artillery/smoke-override.yml
          artillery report artillery-report.json --output artillery-report.html
        continue-on-error: true

      - name: Run Load/Stress/Full Test
        if: needs.setup.outputs.test_type != 'smoke'
        run: |
          artillery run load-testing/artillery/advanced-config.yml \
            --output artillery-report.json
          artillery report artillery-report.json --output artillery-report.html
        continue-on-error: true

      - name: Upload Artillery Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: artillery-results
          path: |
            artillery-report.json
            artillery-report.html
          retention-days: 30

  # ==========================================
  # Job 4: Locust Load Test (untuk full test)
  # ==========================================
  locust-test:
    needs: setup
    if: needs.setup.outputs.test_type == 'full' || needs.setup.outputs.test_type == 'stress'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Locust
        run: pip install locust

      - name: Run Locust Test
        run: |
          locust -f load-testing/locust/advanced_locustfile.py \
            --host=https://jsonplaceholder.typicode.com \
            --headless \
            --users 50 \
            --spawn-rate 5 \
            --run-time 3m \
            --html locust-report.html \
            --csv locust-results

      - name: Upload Locust Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: locust-results
          path: |
            locust-report.html
            locust-results*.csv
          retention-days: 30

  # ==========================================
  # Job 5: Summary & Notification
  # ==========================================
  summary:
    needs: [setup, k6-test, artillery-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: results

      - name: Generate Summary
        run: |
          echo "## Load Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Test Type | ${{ needs.setup.outputs.test_type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| k6 | ${{ needs.k6-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Artillery | ${{ needs.artillery-test.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Notify on Failure
        if: failure()
        run: |
          echo "::error::Load test failed! Check artifacts for details."
          # Tambahkan Slack/Discord notification di sini jika perlu
